<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>photo-diary — 写真日記</title>
    <!-- Noto Sans JP is self-hosted (bundled via @fontsource-variable/noto-sans-jp,
         imported in src/index.css). No runtime Google Fonts fetch — offline & local-first. -->
    <script>
      // テーマを描画前に適用して FOUC を防ぐ
      ;(() => {
        try {
          const mode = localStorage.getItem('photo-diary-theme') || 'system'
          const accent = localStorage.getItem('photo-diary-accent') || 'moss'
          const dark =
            mode === 'dark' ||
            (mode === 'system' && matchMedia('(prefers-color-scheme: dark)').matches)
          const el = document.documentElement
          el.classList.toggle('dark', dark)
          el.setAttribute('data-accent', accent)
        } catch {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
