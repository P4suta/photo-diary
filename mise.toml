# Toolchain pinning for photo-diary.
# This machine manages tools via chezmoi + mise — do NOT install toolchains ad hoc;
# declare them here and run `mise install` (or `just setup`). Local and CI resolve
# the same versions from this one file.
[tools]
# JS runtime for the Vite/React frontend.
node = "lts"
# Package manager. pnpm over npm: content-addressed store, strict node_modules,
# fast installs. `packageManager` in package.json records the exact version too.
pnpm = "10"
# Lint + format for TS/TSX/JSON (biome check / --write). One version, local + CI.
biome = "2.5.0"
# Phase 2: the Rust core (photo-diary-core) and Tauri shell (src-tauri). Separate from the
# global mise rust, we pin the version per-project too, to keep local == CI.
rust = "1.96"
# Task runner (justfile). `just setup` provisions hooks; CI runs the same recipes,
# so bundling/gate logic lives in exactly one place.
just = "1"
# Git-hook manager. `just setup` runs `lefthook install`; pinning it per-repo
# closes a reproducibility gap and lets `just doctor` verify it.
lefthook = "2"
# Source spell-check (pre-commit hook + `just typos`). crate-ci; the github backend
# fetches the prebuilt binary.
"github:crate-ci/typos" = "1"
# Conventional-Commits linter for the commit-msg hook — keeps history well-formed
# for future release automation. cargo backend, binstalled.
"cargo:committed" = "1"
# TOML formatter (`taplo fmt`) for mise.toml today and the Tauri Cargo.toml in
# phase 2. cargo backend, binstalled.
"cargo:taplo-cli" = "0.10"

[settings]
# Fetch cargo: backend tools as prebuilt binaries (cargo-binstall) instead of
# compiling from source — much faster locally and in CI.
cargo.binstall = true
