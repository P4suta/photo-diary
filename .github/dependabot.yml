version: 2
updates:
  # JS deps (pnpm — Dependabot reads pnpm-lock.yaml via the npm ecosystem).
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      js-deps:
        patterns: ["*"]
        update-types: [minor, patch]
    commit-message:
      prefix: build
      include: scope

  # Rust deps (workspace: crates/photo-diary-core + src-tauri).
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      rust-deps:
        patterns: ["*"]
        update-types: [minor, patch]
    commit-message:
      prefix: build
      include: scope

  # The workflow actions themselves.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    groups:
      actions:
        patterns: ["*"]
    commit-message:
      prefix: ci
