name: CI

on:
  push:
    branches: [main]
  pull_request:

# One in-flight run per ref; a new push cancels the previous.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Provisions the exact toolchain pinned in mise.toml (node, pnpm, biome,
      # just, typos, …) — the same versions developers get locally.
      - name: Install toolchain (mise)
        uses: jdx/mise-action@v2

      # Cache the pnpm content-addressed store keyed on the lockfile, so unchanged
      # deps are restored instead of re-downloaded. pnpm comes from mise (above).
      - name: Locate pnpm store
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      # --frozen-lockfile: fail if pnpm-lock.yaml is out of date rather than
      # silently resolving new versions.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # typecheck + Biome + typos + tests with coverage — identical to the pre-push hook.
      # `just check` runs `just coverage`, which enforces the 90% domain/lib thresholds,
      # so the gate is enforced here too (one suite run, not test + coverage twice).
      - name: Check
        run: just check

      - name: Build
        run: just build

  # E2E is heavy (browser), so it's split into its own job. Not part of pre-push / check.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain (mise)
        uses: jdx/mise-action@v2

      - name: Locate pnpm store
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The browser binary is outside mise's management; let Playwright fetch it in the job.
      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E
        run: just e2e

  rust:
    # The product ships as a Windows desktop app, so the Rust workspace (photo-diary-core
    # + the src-tauri shell) is gated on both Linux and Windows. Same gate as local:
    # `just check-rust` = cargo test --workspace + clippy --workspace + fmt --check.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # mise provides the pinned Rust toolchain (rust = "1.96" in mise.toml), plus just.
      - name: Install toolchain (mise)
        uses: jdx/mise-action@v2

      # Building the src-tauri crate on Linux needs the Tauri v2 GTK/WebKit system
      # libraries. Windows runners ship WebView2, so no equivalent step there.
      - name: Install Tauri system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            libxdo-dev \
            build-essential \
            file \
            wget \
            curl

      # Cache the cargo registry + target dir keyed on Cargo.lock and the matrix OS.
      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      # Same recipe the pre-push Rust gate runs locally (justfile is the single source
      # of truth), so local == CI: workspace test + clippy (-D warnings) + fmt check.
      - name: Rust gate (test + clippy + fmt)
        run: just check-rust
